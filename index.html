<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPU Scheduling Simulator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f5; --surface: #ffffff; --surface2: #f0f0f0;
      --border: #e0e0e0; --border2: #c8c8c8;
      --text: #1a1a1a; --text2: #555; --text3: #888;
      --accent: #1a1a1a; --accent-bg: #e8f0fe; --accent-txt: #1a56db;
      --danger-bg: #fde8e8; --danger-txt: #b91c1c;
      --radius: 8px; --radius-lg: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; color: var(--text); background: var(--bg); padding: 24px 16px; }
    .app { max-width: 860px; margin: 0 auto; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .header h1 { font-size: 22px; font-weight: 600; }
    .badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; background: var(--accent-bg); color: var(--accent-txt); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin-bottom: 14px; }
    .algo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; margin-bottom: 14px; }
    .algo-btn { padding: 9px 12px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--surface); color: var(--text2); font-size: 13px; cursor: pointer; text-align: center; }
    .algo-btn.active { border: 2px solid var(--accent-txt); background: var(--accent-bg); color: var(--accent-txt); font-weight: 600; }
    .algo-desc { font-size: 13px; color: var(--text2); padding: 10px 14px; background: var(--surface2); border-radius: var(--radius); border-left: 3px solid var(--accent-txt); margin-bottom: 10px; }
    .quantum-row { display: none; align-items: center; gap: 10px; margin-top: 8px; }
    .quantum-row label { font-size: 13px; color: var(--text2); }
    .quantum-input { width: 64px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--surface2); color: var(--text); font-size: 13px; padding: 6px 8px; text-align: center; }
    .proc-header, .proc-row { display: grid; grid-template-columns: 44px 1fr 1fr 1fr 1fr 36px; gap: 8px; align-items: center; margin-bottom: 6px; }
    .col-lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--text3); text-align: center; }
    .p-name { font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 5px; }
    .p-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .num-input { width: 100%; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--surface2); color: var(--text); font-size: 13px; padding: 7px 8px; text-align: center; }
    .del-btn { width: 32px; height: 32px; border: 1px solid var(--border2); border-radius: var(--radius); background: transparent; color: var(--text3); cursor: pointer; font-size: 16px; }
    .del-btn:hover { background: var(--danger-bg); color: var(--danger-txt); }
    .add-btn { width: 100%; margin-top: 6px; padding: 8px; border: 1px dashed var(--border2); border-radius: var(--radius); background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; }
    .run-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .run-btn { padding: 10px 28px; border: none; border-radius: var(--radius); background: #1a1a1a; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
    .reset-btn { padding: 10px 16px; border: 1px solid var(--border2); border-radius: var(--radius); background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; }
    .err { font-size: 13px; color: var(--danger-txt); padding: 6px 12px; background: var(--danger-bg); border-radius: var(--radius); }
    #result-section { display: none; }
    .gantt-wrap { overflow-x: auto; }
    .gantt-bar { display: flex; height: 40px; border-radius: var(--radius); overflow: hidden; min-width: 300px; }
    .gantt-seg { display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; min-width: 28px; }
    .gantt-seg.idle { background: var(--surface2) !important; color: var(--text3); }
    .gantt-timeline { position: relative; height: 22px; margin-top: 4px; }
    .gantt-tick { position: absolute; font-size: 11px; color: var(--text3); transform: translateX(-50%); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-bottom: 16px; }
    .stat-card { background: var(--surface2); border-radius: var(--radius); padding: 12px 14px; }
    .stat-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
    .stat-val { font-size: 22px; font-weight: 600; }
    .stat-unit { font-size: 12px; color: var(--text3); font-weight: 400; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { text-align: left; padding: 7px 12px; border-bottom: 1px solid var(--border); color: var(--text2); font-weight: 600; font-size: 12px; background: var(--surface2); }
    tbody td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
    tbody tr:last-child td { border-bottom: none; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>CPU Scheduling Simulator</h1>
    <span class="badge" id="algo-badge">FCFS</span>
  </div>
  <div class="card">
    <div class="card-title">Select Algorithm</div>
    <div class="algo-grid">
      <button class="algo-btn active" data-algo="fcfs">FCFS</button>
      <button class="algo-btn" data-algo="sjf">SJF (Non-preemptive)</button>
      <button class="algo-btn" data-algo="srtn">SRTN (Preemptive SJF)</button>
      <button class="algo-btn" data-algo="rr">Round Robin</button>
      <button class="algo-btn" data-algo="priority-np">Priority (Non-preemptive)</button>
      <button class="algo-btn" data-algo="priority-p">Priority (Preemptive)</button>
    </div>
    <div class="algo-desc" id="algo-desc">Processes execute in arrival order. Simple but can cause the convoy effect.</div>
    <div class="quantum-row" id="quantum-row">
      <label>Time Quantum:</label>
      <input type="number" id="quantum" class="quantum-input" value="2" min="1" max="20" />
      <span style="font-size:13px;color:var(--text2)">units</span>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Processes</div>
    <div class="proc-header">
      <div class="col-lbl">PID</div>
      <div class="col-lbl">Arrival</div>
      <div class="col-lbl">Burst</div>
      <div class="col-lbl" id="col-pri" style="display:none">Priority</div>
      <div class="col-lbl" id="col-gap"></div>
      <div></div>
    </div>
    <div id="process-list"></div>
    <button class="add-btn" id="btn-add">+ Add Process</button>
  </div>
  <div class="card">
    <div class="run-row">
      <button class="run-btn" id="btn-run">Run Simulation</button>
      <button class="reset-btn" id="btn-reset">Reset</button>
      <span id="error-msg"></span>
    </div>
  </div>
  <div id="result-section">
    <div class="card">
      <div class="card-title">Gantt Chart</div>
      <div class="gantt-wrap" id="gantt-wrap"></div>
    </div>
    <div class="stats-grid" id="stats-grid"></div>
    <div class="card">
      <div class="card-title">Process Details</div>
      <div class="table-wrap" id="table-wrap"></div>
    </div>
  </div>
</div>

<script>
window.onload = function() {

  /* ── Config ── */
  var COLORS = ['#4f46e5','#0891b2','#b45309','#be185d','#166534','#6d28d9','#c2410c','#0369a1','#065f46','#9d174d'];
  var DESCS = {
    'fcfs':        'Processes execute in arrival order. Simple but can cause the convoy effect.',
    'sjf':         'Picks the shortest burst time from ready queue. Minimizes average wait but can starve long processes.',
    'srtn':        'Preemptive SJF — switches when a shorter remaining time process arrives.',
    'rr':          'Each process gets a fixed time slice. Fair for time-sharing systems.',
    'priority-np': 'Runs highest priority first (1 = highest). Non-preemptive.',
    'priority-p':  'Preemptive priority — higher priority process immediately takes the CPU.'
  };

  /* ── State ── */
  var processes = [];
  var pid = 1;
  var currentAlgo = 'fcfs';

  /* ── DOM refs ── */
  var elBadge      = document.getElementById('algo-badge');
  var elDesc       = document.getElementById('algo-desc');
  var elQuantumRow = document.getElementById('quantum-row');
  var elColPri     = document.getElementById('col-pri');
  var elColGap     = document.getElementById('col-gap');
  var elList       = document.getElementById('process-list');
  var elError      = document.getElementById('error-msg');
  var elResult     = document.getElementById('result-section');
  var elGantt      = document.getElementById('gantt-wrap');
  var elStats      = document.getElementById('stats-grid');
  var elTable      = document.getElementById('table-wrap');

  /* ── Process helpers ── */
  function addProcess(at, bt, pri) {
    at  = (at  !== undefined) ? at  : 0;
    bt  = (bt  !== undefined) ? bt  : 3;
    pri = (pri !== undefined) ? pri : 1;
    processes.push({ id: pid++, at: at, bt: bt, priority: pri });
    render();
  }

  function removeProcess(id) {
    processes = processes.filter(function(p) { return p.id !== id; });
    render();
  }

  function updateField(id, field, val) {
    for (var i = 0; i < processes.length; i++) {
      if (processes[i].id === id) {
        processes[i][field] = parseInt(val, 10) || 0;
        break;
      }
    }
  }

  function render() {
    var isPri = (currentAlgo === 'priority-np' || currentAlgo === 'priority-p');
    elColPri.style.display = isPri ? '' : 'none';
    elColGap.style.display = isPri ? 'none' : '';
    elList.innerHTML = '';
    for (var i = 0; i < processes.length; i++) {
      (function(p, color) {
        var row = document.createElement('div');
        row.className = 'proc-row';

        var nameDiv = document.createElement('div');
        nameDiv.className = 'p-name';
        nameDiv.innerHTML = '<span class="p-dot" style="background:' + color + '"></span>P' + p.id;

        var atInput = makeNumInput(p.at,   0, 999, function(v){ updateField(p.id, 'at', v); });
        var btInput = makeNumInput(p.bt,   1, 999, function(v){ updateField(p.id, 'bt', v); });
        var priInput = isPri ? makeNumInput(p.priority, 1, 20, function(v){ updateField(p.id, 'priority', v); }) : document.createElement('div');

        var spacer = document.createElement('div');

        var delBtn = document.createElement('button');
        delBtn.className = 'del-btn';
        delBtn.textContent = '×';
        delBtn.onclick = function() { removeProcess(p.id); };

        row.appendChild(nameDiv);
        row.appendChild(atInput);
        row.appendChild(btInput);
        row.appendChild(priInput);
        row.appendChild(spacer);
        row.appendChild(delBtn);
        elList.appendChild(row);
      })(processes[i], COLORS[i % COLORS.length]);
    }
  }

  function makeNumInput(val, min, max, onChange) {
    var inp = document.createElement('input');
    inp.type = 'number';
    inp.className = 'num-input';
    inp.value = val;
    inp.min = min;
    inp.max = max;
    inp.onchange = function() { onChange(this.value); };
    return inp;
  }

  /* ── Algorithm buttons ── */
  var algoBtns = document.querySelectorAll('.algo-btn');
  for (var i = 0; i < algoBtns.length; i++) {
    algoBtns[i].onclick = function() {
      for (var j = 0; j < algoBtns.length; j++) algoBtns[j].classList.remove('active');
      this.classList.add('active');
      currentAlgo = this.getAttribute('data-algo');
      elBadge.textContent = this.textContent;
      elDesc.textContent  = DESCS[currentAlgo];
      elQuantumRow.style.display = (currentAlgo === 'rr') ? 'flex' : 'none';
      elResult.style.display = 'none';
      elError.innerHTML = '';
      render();
    };
  }

  /* ── Add / Reset ── */
  document.getElementById('btn-add').onclick = function() { addProcess(); };
  document.getElementById('btn-reset').onclick = function() {
    processes = []; pid = 1;
    elResult.style.display = 'none';
    elError.innerHTML = '';
    addProcess(0, 5, 2);
    addProcess(1, 3, 1);
    addProcess(2, 4, 3);
    addProcess(4, 2, 2);
  };

  /* ── Scheduling core ── */
  function copyProcs() {
    return processes.map(function(p) {
      return { id:p.id, at:p.at, bt:p.bt, priority:p.priority, remaining:p.bt, ct:0, tat:0, wt:0 };
    });
  }

  function addSeg(tl, pid, start, end) {
    if (tl.length > 0 && tl[tl.length-1].pid === pid)
      tl[tl.length-1].end = end;
    else
      tl.push({ pid:pid, start:start, end:end });
  }

  function metrics(ps) {
    for (var i = 0; i < ps.length; i++) {
      ps[i].tat = ps[i].ct - ps[i].at;
      ps[i].wt  = ps[i].tat - ps[i].bt;
    }
  }

  function runFCFS(ps) {
    var tl = [], t = 0;
    ps.sort(function(a,b){ return a.at-b.at; });
    for (var i = 0; i < ps.length; i++) {
      if (t < ps[i].at) { addSeg(tl,'idle',t,ps[i].at); t = ps[i].at; }
      addSeg(tl, ps[i].id, t, t+ps[i].bt);
      ps[i].ct = t+ps[i].bt; t = ps[i].ct;
    }
    return tl;
  }

  function runSJF(ps) {
    var tl=[], done=[], t=0, fin=0, i;
    for (i=0;i<ps.length;i++) done.push(false);
    while (fin < ps.length) {
      var idx=-1, sh=999999;
      for (i=0;i<ps.length;i++)
        if (!done[i] && ps[i].at<=t && ps[i].bt<sh) { sh=ps[i].bt; idx=i; }
      if (idx===-1) {
        var nx=999999;
        for (i=0;i<ps.length;i++) if (!done[i] && ps[i].at<nx) nx=ps[i].at;
        addSeg(tl,'idle',t,nx); t=nx; continue;
      }
      addSeg(tl,ps[idx].id,t,t+ps[idx].bt);
      ps[idx].ct=t+ps[idx].bt; t=ps[idx].ct; done[idx]=true; fin++;
    }
    return tl;
  }

  function runSRTN(ps) {
    var tl=[], done=[], t=0, fin=0, i;
    for (i=0;i<ps.length;i++) done.push(false);
    while (fin < ps.length) {
      var idx=-1, sh=999999;
      for (i=0;i<ps.length;i++)
        if (!done[i] && ps[i].at<=t && ps[i].remaining<sh) { sh=ps[i].remaining; idx=i; }
      if (idx===-1) { addSeg(tl,'idle',t,t+1); t++; continue; }
      addSeg(tl,ps[idx].id,t,t+1);
      ps[idx].remaining--;
      if (ps[idx].remaining===0) { ps[idx].ct=t+1; done[idx]=true; fin++; }
      t++;
    }
    return tl;
  }

  function runRR(ps, q) {
    var tl=[], done=[], inQ=[], queue=[], t=0, fin=0, i;
    ps.sort(function(a,b){ return a.at-b.at; });
    for (i=0;i<ps.length;i++) { done.push(false); inQ.push(false); }
    if (ps.length>0) { queue.push(0); inQ[0]=true; }
    while (fin < ps.length) {
      if (queue.length===0) {
        var nx=999999;
        for (i=0;i<ps.length;i++) if (!done[i] && ps[i].at<nx) nx=ps[i].at;
        addSeg(tl,'idle',t,nx); t=nx;
        for (i=0;i<ps.length;i++)
          if (!done[i]&&!inQ[i]&&ps[i].at<=t){queue.push(i);inQ[i]=true;}
        continue;
      }
      var idx=queue.shift();
      var run=Math.min(q, ps[idx].remaining);
      addSeg(tl,ps[idx].id,t,t+run);
      ps[idx].remaining-=run; t+=run;
      for (i=0;i<ps.length;i++)
        if (!done[i]&&!inQ[i]&&ps[i].at<=t){queue.push(i);inQ[i]=true;}
      if (ps[idx].remaining===0) { ps[idx].ct=t; done[idx]=true; fin++; }
      else queue.push(idx);
    }
    return tl;
  }

  function runPriNP(ps) {
    var tl=[], done=[], t=0, fin=0, i;
    for (i=0;i<ps.length;i++) done.push(false);
    while (fin < ps.length) {
      var idx=-1, hp=999999;
      for (i=0;i<ps.length;i++)
        if (!done[i]&&ps[i].at<=t&&ps[i].priority<hp){hp=ps[i].priority;idx=i;}
      if (idx===-1) {
        var nx=999999;
        for (i=0;i<ps.length;i++) if (!done[i]&&ps[i].at<nx) nx=ps[i].at;
        addSeg(tl,'idle',t,nx); t=nx; continue;
      }
      addSeg(tl,ps[idx].id,t,t+ps[idx].bt);
      ps[idx].ct=t+ps[idx].bt; t=ps[idx].ct; done[idx]=true; fin++;
    }
    return tl;
  }

  function runPriP(ps) {
    var tl=[], done=[], t=0, fin=0, i;
    for (i=0;i<ps.length;i++) done.push(false);
    while (fin < ps.length) {
      var idx=-1, hp=999999;
      for (i=0;i<ps.length;i++)
        if (!done[i]&&ps[i].at<=t&&ps[i].priority<hp){hp=ps[i].priority;idx=i;}
      if (idx===-1) { addSeg(tl,'idle',t,t+1); t++; continue; }
      addSeg(tl,ps[idx].id,t,t+1);
      ps[idx].remaining--;
      if (ps[idx].remaining===0){ps[idx].ct=t+1;done[idx]=true;fin++;}
      t++;
    }
    return tl;
  }

  /* ── Run simulation ── */
  document.getElementById('btn-run').onclick = function() {
    elError.innerHTML = '';

    if (processes.length === 0) {
      elError.innerHTML = '<span class="err">Add at least one process.</span>'; return;
    }
    for (var i = 0; i < processes.length; i++) {
      if (processes[i].bt < 1) {
        elError.innerHTML = '<span class="err">P' + processes[i].id + ': burst must be at least 1.</span>'; return;
      }
    }

    var ps = copyProcs();
    var q  = parseInt(document.getElementById('quantum').value, 10) || 2;
    var tl;

    if      (currentAlgo === 'fcfs')        tl = runFCFS(ps);
    else if (currentAlgo === 'sjf')         tl = runSJF(ps);
    else if (currentAlgo === 'srtn')        tl = runSRTN(ps);
    else if (currentAlgo === 'rr')          tl = runRR(ps, q);
    else if (currentAlgo === 'priority-np') tl = runPriNP(ps);
    else if (currentAlgo === 'priority-p')  tl = runPriP(ps);

    metrics(ps);

    var totalTime = tl.length > 0 ? tl[tl.length-1].end : 0;
    var idleTime  = 0;
    for (var i = 0; i < tl.length; i++)
      if (tl[i].pid === 'idle') idleTime += tl[i].end - tl[i].start;

    var cpuUtil   = totalTime > 0 ? ((totalTime-idleTime)/totalTime*100).toFixed(1) : '0.0';
    var throughput = totalTime > 0 ? (ps.length/totalTime).toFixed(3) : '0.000';
    var sw=0, st=0;
    for (var i=0;i<ps.length;i++){sw+=ps[i].wt; st+=ps[i].tat;}
    var avgWT  = (sw/ps.length).toFixed(2);
    var avgTAT = (st/ps.length).toFixed(2);

    drawGantt(tl, ps, totalTime);
    drawStats(avgWT, avgTAT, cpuUtil, throughput, totalTime);
    drawTable(ps);
    elResult.style.display = '';
  };

  /* ── Draw Gantt ── */
  function drawGantt(tl, ps, totalTime) {
    var colorMap = {};
    for (var i=0;i<ps.length;i++) colorMap[ps[i].id] = COLORS[i % COLORS.length];

    var total = totalTime || 1;
    var barHTML = '<div class="gantt-bar">';
    for (var i=0;i<tl.length;i++) {
      var s = tl[i];
      var dur = s.end - s.start;
      var pct = (dur / total * 100).toFixed(2);
      var minW = Math.max(28, dur * 24);
      var isIdle = (s.pid === 'idle');
      var label = isIdle ? 'idle' : 'P'+s.pid;
      var bg = isIdle ? '' : 'background:'+colorMap[s.pid]+';';
      barHTML += '<div class="gantt-seg'+(isIdle?' idle':'')+'" style="'+bg+'width:'+pct+'%;min-width:'+minW+'px" title="'+label+' ['+s.start+'-'+s.end+']">'+label+'</div>';
    }
    barHTML += '</div>';

    var ticks = [0];
    for (var i=0;i<tl.length;i++) {
      if (ticks.indexOf(tl[i].start) === -1) ticks.push(tl[i].start);
      if (ticks.indexOf(tl[i].end)   === -1) ticks.push(tl[i].end);
    }
    ticks.sort(function(a,b){return a-b;});
    var tickHTML = '<div class="gantt-timeline">';
    for (var i=0;i<ticks.length;i++) {
      var pct = (ticks[i]/total*100).toFixed(2);
      tickHTML += '<span class="gantt-tick" style="left:'+pct+'%">'+ticks[i]+'</span>';
    }
    tickHTML += '</div>';
    elGantt.innerHTML = barHTML + tickHTML;
  }

  /* ── Draw Stats ── */
  function drawStats(avgWT, avgTAT, cpuUtil, throughput, totalTime) {
    elStats.innerHTML =
      card('Avg Waiting', avgWT, 'units') +
      card('Avg Turnaround', avgTAT, 'units') +
      card('CPU Utilization', cpuUtil, '%') +
      card('Throughput', throughput, 'p/unit') +
      card('Total Time', totalTime, 'units');
  }
  function card(label, val, unit) {
    return '<div class="stat-card"><div class="stat-label">'+label+'</div><div class="stat-val">'+val+' <span class="stat-unit">'+unit+'</span></div></div>';
  }

  /* ── Draw Table ── */
  function drawTable(ps) {
    var isPri = (currentAlgo === 'priority-np' || currentAlgo === 'priority-p');
    var colorMap = {};
    for (var i=0;i<ps.length;i++) colorMap[ps[i].id] = COLORS[i % COLORS.length];

    var h = '<table><thead><tr><th>Process</th><th>Arrival</th><th>Burst</th>'+(isPri?'<th>Priority</th>':'')+'<th>Completion</th><th>Turnaround</th><th>Waiting</th></tr></thead><tbody>';
    var sorted = ps.slice().sort(function(a,b){return a.id-b.id;});
    for (var i=0;i<sorted.length;i++) {
      var p = sorted[i];
      h += '<tr><td><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+colorMap[p.id]+';margin-right:6px;"></span>P'+p.id+'</td><td>'+p.at+'</td><td>'+p.bt+'</td>'+(isPri?'<td>'+p.priority+'</td>':'')+'<td>'+p.ct+'</td><td>'+p.tat+'</td><td>'+p.wt+'</td></tr>';
    }
    h += '</tbody></table>';
    elTable.innerHTML = h;
  }

  /* ── Load defaults ── */
  addProcess(0, 5, 2);
  addProcess(1, 3, 1);
  addProcess(2, 4, 3);
  addProcess(4, 2, 2);

}; /* end window.onload */
</script>
</body>
</html>
